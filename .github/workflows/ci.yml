name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check dist was generated
        run: |
          if [ ! -f dist/index.js ] || [ ! -f dist/index.mjs ] || [ ! -f dist/index.d.ts ]; then
            echo "❌ dist files are missing after build"
            exit 1
          fi
          echo "✅ dist files generated successfully"
